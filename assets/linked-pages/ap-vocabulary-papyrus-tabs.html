<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AP Latin Vocabulary Lists</title>
<style>
  :root {
    --ink:#3f2412;
    --ink-soft:#6d472b;
    --dark:#23140b;
    --papyrus:#ead6a3;
    --papyrus-light:#f8edc8;
    --gold:#b58a3a;
    --wine:#6e1f1b;
    --shadow:rgba(40,22,8,.28);
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    color:var(--ink);
    font-family: Georgia, "Times New Roman", serif;
    background:
      radial-gradient(circle at 10% 15%, rgba(255,246,204,.35), transparent 28%),
      radial-gradient(circle at 85% 10%, rgba(150,92,35,.18), transparent 26%),
      linear-gradient(135deg, #4a2a15 0%, #1f120a 100%);
    overflow-x:hidden;
  }
  body::before {
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:.22;
    background-image:
      radial-gradient(rgba(255,255,255,.28) 1px, transparent 1px),
      radial-gradient(rgba(0,0,0,.20) 1px, transparent 1px);
    background-size: 23px 23px, 31px 31px;
    mix-blend-mode: overlay;
  }
  .wrap {
    width:min(1400px, 96vw);
    margin:24px auto;
    display:grid;
    grid-template-columns: 300px 1fr;
    gap:22px;
  }
  header {
    grid-column:1 / -1;
    position:relative;
    padding:34px 38px 30px;
    border-radius:28px;
    background:
      linear-gradient(90deg, rgba(87,44,17,.18), transparent 14%, transparent 86%, rgba(87,44,17,.18)),
      radial-gradient(circle at 50% 0%, rgba(255,255,255,.55), transparent 42%),
      linear-gradient(180deg, var(--papyrus-light), var(--papyrus));
    box-shadow: 0 22px 55px rgba(0,0,0,.32), inset 0 0 0 1px rgba(83,43,16,.22);
    overflow:hidden;
  }
  header::after {
    content:"";
    position:absolute;
    inset:10px;
    border:1px solid rgba(91,47,18,.28);
    border-radius:22px;
    pointer-events:none;
  }
  .eyebrow {
    margin:0 0 7px;
    letter-spacing:.18em;
    text-transform:uppercase;
    font-size:.78rem;
    color:var(--wine);
    font-weight:bold;
  }
  h1 {
    margin:0;
    font-size:clamp(2.1rem, 4vw, 4.25rem);
    line-height:.95;
    color:#3a1d0d;
    text-shadow:0 1px 0 rgba(255,255,255,.45);
  }
  .subtitle {
    margin:14px 0 0;
    max-width:900px;
    color:#604028;
    font-size:1.05rem;
    line-height:1.5;
  }
  aside, main {
    border-radius:26px;
    background:
      linear-gradient(90deg, rgba(75,37,13,.13), transparent 12%, transparent 88%, rgba(75,37,13,.13)),
      radial-gradient(circle at 20% 0%, rgba(255,255,255,.44), transparent 30%),
      linear-gradient(180deg, #f6e7bd, #dec88f);
    box-shadow: 0 18px 45px rgba(0,0,0,.28), inset 0 0 0 1px rgba(70,35,12,.25);
  }
  aside {
    padding:18px;
    align-self:start;
    position:sticky;
    top:18px;
    max-height:calc(100vh - 36px);
    display:flex;
    flex-direction:column;
  }
  .searchbox {
    position:relative;
    margin-bottom:14px;
  }
  input {
    width:100%;
    border:1px solid rgba(67,35,15,.35);
    background:rgba(255,246,214,.72);
    color:var(--ink);
    border-radius:999px;
    padding:13px 16px;
    font: 1rem Georgia, "Times New Roman", serif;
    outline:none;
    box-shadow: inset 0 2px 8px rgba(86,47,18,.12);
  }
  input:focus {
    border-color:var(--wine);
    box-shadow:0 0 0 3px rgba(110,31,27,.13), inset 0 2px 8px rgba(86,47,18,.12);
  }
  .tablist {
    display:flex;
    flex-direction:column;
    gap:8px;
    overflow:auto;
    padding-right:4px;
  }
  button.tab {
    width:100%;
    border:1px solid rgba(82,43,16,.28);
    background:linear-gradient(180deg, rgba(255,248,224,.75), rgba(224,194,127,.52));
    color:var(--ink);
    border-radius:16px;
    padding:11px 12px;
    text-align:left;
    cursor:pointer;
    box-shadow:0 6px 14px rgba(60,30,9,.10);
    transition:transform .14s ease, background .14s ease, border-color .14s ease;
    font-family:Georgia, "Times New Roman", serif;
  }
  button.tab:hover { transform:translateY(-1px); border-color:rgba(110,31,27,.55); }
  button.tab.active {
    background:linear-gradient(180deg, #7e2a22, #5c1d18);
    color:#fff4d6;
    border-color:rgba(255,230,166,.5);
  }
  .tabname { display:block; font-weight:bold; font-size:.95rem; }
  .tabcount { display:block; margin-top:2px; font-size:.78rem; opacity:.72; }
  main {
    padding:22px;
    min-height:70vh;
  }
  .panel-head {
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
    padding:6px 6px 18px;
    border-bottom:2px solid rgba(86,45,18,.18);
  }
  h2 {
    margin:0;
    font-size:clamp(1.6rem, 3vw, 2.6rem);
    color:#3a1d0d;
  }
  .count-pill {
    white-space:nowrap;
    border:1px solid rgba(78,41,16,.25);
    border-radius:999px;
    padding:9px 13px;
    background:rgba(255,246,214,.58);
    color:#5c3822;
    font-weight:bold;
  }
  .table-wrap {
    margin-top:18px;
    overflow:auto;
    border-radius:20px;
    border:1px solid rgba(78,41,16,.20);
    box-shadow: inset 0 0 40px rgba(89,48,16,.08);
  }
  table {
    width:100%;
    border-collapse:collapse;
    min-width:680px;
    background:rgba(255,246,218,.42);
  }
  thead th {
    position:sticky;
    top:0;
    z-index:2;
    background:linear-gradient(180deg, #5b2e16, #3a1d0d);
    color:#fff2ce;
    letter-spacing:.08em;
    text-transform:uppercase;
    font-size:.82rem;
    padding:13px 16px;
    text-align:left;
  }
  tbody td {
    padding:12px 16px;
    border-bottom:1px solid rgba(90,48,17,.16);
    vertical-align:top;
    line-height:1.35;
  }
  tbody tr:nth-child(odd) td { background:rgba(255,250,230,.25); }
  tbody tr:hover td { background:rgba(181,138,58,.18); }
  td.latin {
    width:38%;
    font-weight:bold;
    color:#351a0b;
  }
  td.def { color:#55351f; }
  .empty {
    padding:38px;
    text-align:center;
    color:#6b4a32;
    font-style:italic;
  }
  .footer-note {
    margin-top:18px;
    color:#68472e;
    font-size:.93rem;
    text-align:right;
  }
  .ornament {
    color:var(--gold);
    font-size:1.2rem;
    letter-spacing:.25em;
    margin-top:10px;
  }
  mark {
    background:#ffe08a;
    color:#2a1508;
    border-radius:4px;
    padding:0 .12em;
  }

  .mode-toggle {
    margin-top:14px;
    padding:14px 14px;
    border-radius:18px;
    background:rgba(255,248,216,.42);
    border:1px solid rgba(92,52,20,.22);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.22);
  }
  .toggle-row {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    cursor:pointer;
    color:var(--ink);
    font-weight:bold;
    line-height:1.2;
  }
  .toggle-row input { position:absolute; opacity:0; pointer-events:none; }
  .toggle-switch {
    flex:0 0 auto;
    width:54px;
    height:30px;
    border-radius:999px;
    background:rgba(76,43,18,.28);
    border:1px solid rgba(61,31,11,.38);
    position:relative;
    transition:background .22s ease, box-shadow .22s ease;
  }
  .toggle-switch::after {
    content:"";
    position:absolute;
    width:24px;
    height:24px;
    left:2px;
    top:2px;
    border-radius:50%;
    background:linear-gradient(180deg, #fff6ce, #caa45b);
    box-shadow:0 2px 7px rgba(0,0,0,.25);
    transition:transform .22s ease;
  }
  #nonRequiredToggle:checked + .toggle-switch {
    background:var(--wine);
    box-shadow:0 0 0 3px rgba(110,31,27,.14);
  }
  #nonRequiredToggle:checked + .toggle-switch::after { transform:translateX(24px); }
  .mode-note {
    margin:9px 2px 0;
    font-size:.82rem;
    color:var(--ink-soft);
    line-height:1.35;
  }
  body.non-required-mode .eyebrow::after {
    content:" · Non Required Words";
    color:var(--gold);
  }


  .panel-actions {
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }
  .copy-btn {
    border:1px solid rgba(91,55,23,.35);
    border-radius:999px;
    padding:10px 16px;
    cursor:pointer;
    font-family: Georgia, "Times New Roman", serif;
    font-weight:700;
    letter-spacing:.02em;
    color:#f8edc8;
    background:linear-gradient(135deg, #7a2a20, #4b1b16);
    box-shadow:0 8px 18px rgba(50,24,8,.22), inset 0 1px 0 rgba(255,255,255,.18);
    transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
  }
  .copy-btn:hover {
    transform:translateY(-1px);
    box-shadow:0 11px 22px rgba(50,24,8,.28), inset 0 1px 0 rgba(255,255,255,.2);
    filter:brightness(1.04);
  }
  .copy-btn:active { transform:translateY(0); }
  .copy-status {
    min-width:62px;
    font-size:.88rem;
    font-weight:700;
    color:var(--wine);
    opacity:0;
    transform:translateY(2px);
    transition:opacity .2s ease, transform .2s ease;
  }
  .copy-status.visible {
    opacity:1;
    transform:translateY(0);
  }


  .view-badge {
    display:inline-flex;
    align-items:center;
    width:max-content;
    margin-top:10px;
    border:1px solid rgba(110,31,27,.24);
    border-radius:999px;
    padding:7px 12px;
    background:rgba(255,246,214,.62);
    color:var(--wine);
    font-size:.86rem;
    font-weight:700;
    letter-spacing:.02em;
  }
  .sort-control {
    border:1px solid rgba(91,55,23,.35);
    border-radius:999px;
    padding:10px 13px;
    font-family: Georgia, "Times New Roman", serif;
    font-weight:700;
    color:var(--ink);
    background:rgba(255,246,214,.72);
    box-shadow: inset 0 2px 8px rgba(86,47,18,.10);
    cursor:pointer;
  }
  .mode-btn {
    border:1px solid rgba(91,55,23,.35);
    border-radius:999px;
    padding:10px 16px;
    cursor:pointer;
    font-family: Georgia, "Times New Roman", serif;
    font-weight:700;
    letter-spacing:.02em;
    color:var(--ink);
    background:linear-gradient(180deg, rgba(255,248,224,.85), rgba(224,194,127,.62));
    box-shadow:0 8px 18px rgba(50,24,8,.14), inset 0 1px 0 rgba(255,255,255,.25);
    transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
  }
  .mode-btn:hover {
    transform:translateY(-1px);
    box-shadow:0 11px 22px rgba(50,24,8,.20), inset 0 1px 0 rgba(255,255,255,.25);
    filter:brightness(1.03);
  }
  .mode-btn.active {
    color:#fff4d6;
    background:linear-gradient(135deg, #7a2a20, #4b1b16);
  }
  .flashcard-wrap {
    display:none;
    margin-top:18px;
  }
  main.flashcard-mode .table-wrap { display:none; }
  main.flashcard-mode .flashcard-wrap { display:block; }
  .flashcard-stage {
    width:min(100%, 620px);
    min-height:330px;
    margin:0 auto;
    perspective:1200px;
    cursor:pointer;
    text-align:center;
  }
  .flashcard-inner {
    position:relative;
    width:100%;
    min-height:330px;
    transform-style:preserve-3d;
    transition:transform .62s cubic-bezier(.2,.75,.18,1);
  }
  .flashcard-stage.is-flipped .flashcard-inner {
    transform:rotateY(180deg);
  }
  .flashcard-face {
    position:absolute;
    inset:0;
    border-radius:24px;
    border:1px solid rgba(78,41,16,.22);
    background:
      radial-gradient(circle at 50% 0%, rgba(255,255,255,.42), transparent 35%),
      linear-gradient(180deg, rgba(255,248,224,.70), rgba(221,191,126,.58));
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.24), 0 12px 30px rgba(68,35,12,.16);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:28px;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    overflow:hidden;
  }
  .flashcard-face.back {
    transform:rotateY(180deg);
    background:
      radial-gradient(circle at 50% 0%, rgba(255,255,255,.35), transparent 35%),
      linear-gradient(180deg, rgba(245,226,169,.82), rgba(202,159,85,.60));
  }
  .flashcard-face::before {
    content:"";
    position:absolute;
    inset:14px;
    border:1px solid rgba(107,61,25,.18);
    border-radius:18px;
    pointer-events:none;
  }
  .flashcard-face-label {
    margin:0 0 14px;
    color:var(--wine);
    font-weight:700;
    letter-spacing:.14em;
    text-transform:uppercase;
    font-size:.78rem;
    position:relative;
    z-index:1;
  }
  .flashcard-text {
    margin:0;
    max-width:520px;
    color:#351a0b;
    font-size:clamp(1.45rem, 3.1vw, 2.55rem);
    line-height:1.14;
    overflow-wrap:anywhere;
    position:relative;
    z-index:1;
  }
  .flashcard-help {
    margin:14px 0 0;
    color:var(--ink-soft);
    font-style:italic;
    position:relative;
    z-index:1;
  }
  .flashcard-actions {
    margin-top:14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  .flashcard-nav {
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .flashcard-progress {
    font-weight:700;
    color:var(--ink-soft);
  }

  @media (max-width: 900px) {
    .wrap { grid-template-columns:1fr; }
    aside { position:relative; top:auto; max-height:380px; }
    .panel-head { align-items:flex-start; flex-direction:column; }
    .count-pill { white-space:normal; }
  }
  @media print {
    body { background:white; }
    .wrap { display:block; width:auto; margin:0; }
    aside { display:none; }
    header, main { box-shadow:none; border:1px solid #b99d67; margin-bottom:14px; }
    .table-wrap { overflow:visible; }
    thead th { position:static; }
    button { display:none; }
  }
</style>
</head>

  <div class="wrap">
    <header>
      <p class="eyebrow">AP Latin Vocabulary</p>
      <h1>Tabulae Verborum</h1>
      <div class="ornament">✦ ·𐆖· ✦</div>
    </header>

    <aside>
      <div class="searchbox">
        <input id="search" type="search" placeholder="Search Latin or definition…" autocomplete="off" />
      </div>
      <div class="mode-toggle">
        <label class="toggle-row" for="nonRequiredToggle">
          <span>Non Required Words Only</span>
          <input id="nonRequiredToggle" type="checkbox" />
          <span class="toggle-switch" aria-hidden="true"></span>
        </label>
        <p id="mode-note" class="mode-note">Showing the original required vocabulary lists.</p>
      </div>
      <nav id="tabs" class="tablist" aria-label="Vocabulary tabs"></nav>
    </aside>

    <main>
      <section class="panel-head">
        <div>
          <h2 id="sheet-title"></h2>
          <div id="viewBadge" class="view-badge">Viewing: Required Vocabulary</div>
          <div class="ornament">— 𐆖 —</div>
        </div>
        <div class="panel-actions">
          <select id="sortMode" class="sort-control" aria-label="Sort vocabulary list">
            <option value="original">Original Order</option>
            <option value="alpha">Alphabetical</option>
          </select>
          <button id="flashcardToggle" class="mode-btn" type="button">Flashcard Mode</button>
          <button id="copyList" class="copy-btn" type="button">Copy List</button>
          <span id="copyStatus" class="copy-status" aria-live="polite"></span>
          <div id="count" class="count-pill"></div>
        </div>
      </section>
      <div id="flashcardWrap" class="flashcard-wrap">
        <div id="flashcardStage" class="flashcard-stage" role="button" tabindex="0" aria-label="Flip flashcard">
          <div class="flashcard-inner">
            <div class="flashcard-face front">
              <p class="flashcard-face-label">Latin</p>
              <p id="flashcardLatinText" class="flashcard-text"></p>
              <p class="flashcard-help">Click the card to flip to the definition.</p>
            </div>
            <div class="flashcard-face back">
              <p class="flashcard-face-label">Definition</p>
              <p id="flashcardDefinitionText" class="flashcard-text"></p>
              <p class="flashcard-help">Click again to return to the Latin.</p>
            </div>
          </div>
        </div>
        <div class="flashcard-actions">
          <div class="flashcard-nav">
            <button id="prevCard" class="mode-btn" type="button">Previous</button>
            <button id="flipCard" class="mode-btn" type="button">Flip</button>
            <button id="nextCard" class="mode-btn" type="button">Next</button>
          </div>
          <div id="flashcardProgress" class="flashcard-progress"></div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Latin</th><th>Definition</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div class="footer-note">Made from 40 workbook tabs · 5,685 total entries</div>
    </main>
  </div>

function esc(str) {
  return String(str ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function highlight(text, q) {
  const safe = esc(text);
  if (!q) return safe;
  const pattern = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return safe.replace(new RegExp(pattern, 'gi'), m => `<mark>${m}</mark>`);
}

function buildTabs() {
  tabsEl.innerHTML = SHEETS.map((s, i) => `
    <button class="tab ${i === active ? 'active' : ''}" onclick="selectSheet(${i})">
      <span class="tabname">${esc(s.name)}</span>
      <span class="tabcount">${s.rows.length} entries</span>
    </button>
  `).join('');
}

function selectSheet(i) {
  active = i;
  searchEl.value = '';
  resetFlashcard();
  buildTabs();
  renderRows();
  window.scrollTo({top:0, behavior:'smooth'});
}

function getDisplayRows() {
  const sheet = SHEETS[active];
  const q = searchEl.value.trim().toLowerCase();
  let rows = q
    ? sheet.rows.filter(r => String(r[0]).toLowerCase().includes(q) || String(r[1]).toLowerCase().includes(q))
    : sheet.rows.slice();

  if (sortMode === 'alpha') {
    rows = rows.slice().sort((a, b) => String(a[0]).localeCompare(String(b[0]), undefined, {sensitivity:'base'}));
  }
  return rows;
}

function resetFlashcard() {
  cardIndex = 0;
  cardFace = 'latin';
}

function renderFlashcard() {
  const rows = getDisplayRows();
  flashcardStageEl.classList.toggle('is-flipped', cardFace === 'definition');
  if (!rows.length) {
    flashcardLatinTextEl.textContent = 'No matching vocabulary found.';
    flashcardDefinitionTextEl.textContent = 'Try changing the search or selecting another list.';
    flashcardProgressEl.textContent = '0 of 0';
    return;
  }
  if (cardIndex >= rows.length) cardIndex = rows.length - 1;
  if (cardIndex < 0) cardIndex = 0;
  const [latin, definition] = rows[cardIndex];
  flashcardLatinTextEl.textContent = latin;
  flashcardDefinitionTextEl.textContent = definition;
  flashcardProgressEl.textContent = `${cardIndex + 1} of ${rows.length}`;
}

function renderRows() {
  const sheet = SHEETS[active];
  const q = searchEl.value.trim().toLowerCase();
  titleEl.textContent = sheet.name;

  const filtered = getDisplayRows();
  countEl.textContent = `${filtered.length} of ${sheet.rows.length} entries`;

  if (!filtered.length) {
    rowsEl.innerHTML = `<tr><td class="empty" colspan="2">No matching vocabulary found on this tab.</td></tr>`;
    renderFlashcard();
    return;
  }

  rowsEl.innerHTML = filtered.map(r => `
    <tr>
      <td class="latin">${highlight(r[0], q)}</td>
      <td class="def">${highlight(r[1], q)}</td>
    </tr>
  `).join('');
  renderFlashcard();
}


async function copyCurrentList() {
  const sheet = SHEETS[active];
  const text = sheet.rows
    .map(([latin, definition]) => `${latin}	${definition}`)
    .join('\n');

  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
    } else {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.setAttribute('readonly', '');
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
    }
    copyStatusEl.textContent = 'Copied';
    copyStatusEl.classList.add('visible');
    copyBtnEl.textContent = 'Copy List';
    clearTimeout(copyTimer);
    copyTimer = setTimeout(() => {
      copyStatusEl.classList.remove('visible');
      copyStatusEl.textContent = '';
    }, 1600);
  } catch (err) {
    copyStatusEl.textContent = 'Copy failed';
    copyStatusEl.classList.add('visible');
  }
}

function getTotalEntries(sheets) {
  return sheets.reduce((sum, sheet) => sum + sheet.rows.length, 0);
}

function updateFooter() {
  const label = activeMode === 'non' ? 'non-required vocabulary' : 'required vocabulary';
  footerNoteEl.textContent = `Made from ${SHEETS.length} workbook tabs · ${getTotalEntries(SHEETS).toLocaleString()} total ${label} entries`;
  modeNoteEl.textContent = activeMode === 'non'
    ? 'Showing only the non-required vocabulary lists.'
    : 'Showing the original required vocabulary lists.';
  viewBadgeEl.textContent = activeMode === 'non'
    ? 'Viewing: Non-Required Vocabulary'
    : 'Viewing: Required Vocabulary';
  document.body.classList.toggle('non-required-mode', activeMode === 'non');
}

function switchMode(useNonRequired) {
  activeMode = useNonRequired ? 'non' : 'required';
  SHEETS = useNonRequired ? NON_REQUIRED_SHEETS : REQUIRED_SHEETS;
  active = 0;
  searchEl.value = '';
  resetFlashcard();
  updateFooter();
  buildTabs();
  renderRows();
  window.scrollTo({top:0, behavior:'smooth'});
}

searchEl.addEventListener('input', () => { resetFlashcard(); renderRows(); });
sortModeEl.addEventListener('change', () => { sortMode = sortModeEl.value; resetFlashcard(); renderRows(); });
copyBtnEl.addEventListener('click', copyCurrentList);
toggleEl.addEventListener('change', () => switchMode(toggleEl.checked));
flashcardToggleEl.addEventListener('click', () => {
  flashcardMode = !flashcardMode;
  mainEl.classList.toggle('flashcard-mode', flashcardMode);
  flashcardToggleEl.classList.toggle('active', flashcardMode);
  flashcardToggleEl.textContent = flashcardMode ? 'List Mode' : 'Flashcard Mode';
  resetFlashcard();
  renderRows();
});
flashcardStageEl.addEventListener('click', () => { cardFace = cardFace === 'latin' ? 'definition' : 'latin'; renderFlashcard(); });
flashcardStageEl.addEventListener('keydown', (event) => {
  if (event.key === 'Enter' || event.key === ' ') {
    event.preventDefault();
    cardFace = cardFace === 'latin' ? 'definition' : 'latin';
    renderFlashcard();
  }
});
flipCardEl.addEventListener('click', () => { cardFace = cardFace === 'latin' ? 'definition' : 'latin'; renderFlashcard(); });
prevCardEl.addEventListener('click', () => {
  const rows = getDisplayRows();
  if (!rows.length) return;
  cardIndex = (cardIndex - 1 + rows.length) % rows.length;
  cardFace = 'latin';
  renderFlashcard();
});
nextCardEl.addEventListener('click', () => {
  const rows = getDisplayRows();
  if (!rows.length) return;
  cardIndex = (cardIndex + 1) % rows.length;
  cardFace = 'latin';
  renderFlashcard();
});
updateFooter();
buildTabs();
renderRows();
</script>
</body>
</html>
